name: update-release

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-slim
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: install-nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: update-release
        run: nix run .#update-release -- --push
